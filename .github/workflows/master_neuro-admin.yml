name: Build and deploy Next.js 15 app to Azure Web App - Neuro-Admin

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        env:
          NEXT_PUBLIC_PROTOCOL: ${{ secrets.NEXT_PUBLIC_PROTOCOL }}
          NEXT_PUBLIC_ORIGIN: ${{ github.ref == 'refs/heads/master' && secrets.NEXT_PUBLIC_ORIGIN || secrets.NEXT_PUBLIC_ORIGIN_DEV }}
          NEXT_PUBLIC_AGENT_HOST: ${{ github.ref == 'refs/heads/master' && secrets.NEXT_PUBLIC_AGENT_HOST || secrets.NEXT_PUBLIC_AGENT_HOST_DEV }}
          NEXT_PUBLIC_HOTJAR_ID: ${{ secrets.NEXT_PUBLIC_HOTJAR_ID }}
          NEXT_PUBLIC_HOTJAR_ENABLE_DEV: ${{ github.ref == 'refs/heads/master' && 'false' || 'true' }}
          NEXT_PUBLIC_HOTJAR_BYPASS_CONSENT: ${{ secrets.NEXT_PUBLIC_HOTJAR_BYPASS_CONSENT }}
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/.next
          cp -r node_modules deploy/node_modules
          cp -r public deploy/public
          cp package.json deploy/
          cp package-lock.json deploy/
          cp server.js deploy/ || echo "⚠️ server.js NOT found!"
          echo "Final deploy folder structure:"
          ls -la deploy
          cd deploy
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    environment:
      name: Development

    strategy:
      fail-fast: false
      matrix:
        app:
          - name: 'Neuro-Admin'
            slot: 'dev'
            publishProfileSecret: 'AZURE_NEURO_ADMIN_DEV'
          - name: 'kikkin-neuro-admin'
            slot: 'dev'
            publishProfileSecret: 'AZURE_NEURO_ADMIN_KIKKIN_DEV'
          - name: 'clientx-neuro-admin'
            slot: 'dev'
            publishProfileSecret: 'AZURE_CLIENTX_NEURO_ADMIN_DEV'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip -d deploy

      - name: Debug deployed files
        run: ls -la ./deploy

      - name: Deploy to Azure Web App (DEV) with slot
        if: ${{ matrix.app.slot != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app.name }}
          slot-name: ${{ matrix.app.slot }}
          package: ./deploy
          publish-profile: ${{ secrets[matrix.app.publishProfileSecret] }}

      - name: Deploy to Azure Web App (DEV) without slot
        if: ${{ matrix.app.slot == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app.name }}
          package: ./deploy
          publish-profile: ${{ secrets[matrix.app.publishProfileSecret] }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment:
      name: Production

    strategy:
      fail-fast: false
      matrix:
        app:
          - name: 'Neuro-Admin'
            slot: 'Production'
            publishProfileSecret: 'AZURE_NEURO_ADMIN_PROD'
          - name: 'kikkin-neuro-admin'
            slot: 'Production'
            publishProfileSecret: 'AZURE_NEURO_ADMIN_KIKKIN_PROD'
          - name: 'Innova'
            slot: ''
            publishProfileSecret: 'AZURE_NEURO_ADMIN_INNOVA_PROD'
          - name: 'clientx-neuro-admin'
            slot: ''
            publishProfileSecret: 'AZURE_NEURO_ADMIN_ATHLETSANDYOU_PROD'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip -d deploy

      - name: Debug deployed files
        run: ls -la ./deploy

      - name: Deploy to Azure Web App (PROD) with slot
        if: ${{ matrix.app.slot != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app.name }}
          slot-name: ${{ matrix.app.slot }}
          package: ./deploy
          publish-profile: ${{ secrets[matrix.app.publishProfileSecret] }}

      - name: Deploy to Azure Web App (PROD) without slot
        if: ${{ matrix.app.slot == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app.name }}
          package: ./deploy
          publish-profile: ${{ secrets[matrix.app.publishProfileSecret] }}
